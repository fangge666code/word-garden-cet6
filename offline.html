<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f6b4f" />
    <title>词间 · 等待网络连接</title>
    <style>
      :root { color-scheme: light; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; color: #19382d; background: #fffef9; }
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at top left, #e8f4ed, transparent 42%), #fffef9; }
      main { width: min(430px, 100%); padding: 42px 32px; border: 1px solid rgba(31, 107, 79, .12); border-radius: 28px; text-align: center; background: rgba(255, 255, 255, .82); box-shadow: 0 22px 70px rgba(31, 75, 58, .12); }
      .mark { display: grid; place-items: center; width: 72px; height: 72px; margin: 0 auto 24px; border-radius: 22px 22px 22px 7px; color: white; background: #1f6b4f; font-size: 34px; font-weight: 800; }
      p:first-of-type { margin: 0 0 10px; color: #1f6b4f; font-size: 12px; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; }
      h1 { margin: 0; font-size: 30px; }
      .message { margin: 14px 0 28px; color: #718179; line-height: 1.7; }
      button { min-height: 46px; padding: 0 22px; border: 0; border-radius: 14px; color: white; background: #1f6b4f; font: inherit; font-weight: 700; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">W</div>
      <p>Word Garden</p>
      <h1>请连接网络后继续学习</h1>
      <p class="message">“词间”需要联网加载单词和学习页面。网络恢复后，点击下方按钮即可继续。</p>
      <button type="button" onclick="location.reload()">重新加载</button>
    </main>
  </body>
</html>
